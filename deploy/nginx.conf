# Konfiguracja nginx dla projekty.dev
#
# Aplikacja to statyczne pliki — nie ma backendu do uruchomienia, nie ma
# procesu Node do pilnowania. nginx tylko je serwuje.
#
# Podmień domenę i ścieżkę do certyfikatu, a resztę zostaw.

server {
    listen 80;
    listen [::]:80;
    server_name projekty.twojadomena.pl;

    # HTTPS nie jest tu ozdobą: logowanie Supabase wymaga bezpiecznego
    # kontekstu, a bez niego magic link nie zadziała.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name projekty.twojadomena.pl;

    ssl_certificate     /etc/letsencrypt/live/projekty.twojadomena.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/projekty.twojadomena.pl/privkey.pem;

    root /var/www/projekty.dev;
    index index.html;

    # --- Nagłówki bezpieczeństwa --------------------------------------------
    add_header X-Content-Type-Options nosniff              always;
    add_header X-Frame-Options        SAMEORIGIN           always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Kompresja ----------------------------------------------------------
    gzip             on;
    gzip_vary        on;
    gzip_min_length  1024;
    gzip_types       text/plain text/css application/javascript application/json image/svg+xml;

    # --- Zasoby z odciskiem palca w nazwie ----------------------------------
    # Vite wstawia hash treści w nazwę pliku, więc zmiana zawartości zmienia
    # nazwę. Taki plik można cache'ować w nieskończoność bez ryzyka, że
    # przeglądarka poda starą wersję.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /favicon.svg {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # --- Punkt wejścia ------------------------------------------------------
    # index.html NIE może być cache'owany. To on wskazuje na aktualne nazwy
    # plików z /assets/ — zapamiętany przez przeglądarkę serwowałby po
    # wdrożeniu odwołania do plików, których już nie ma.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }

    # Wejście pod dowolny adres oddaje aplikację. Dziś nie ma routingu po
    # ścieżkach, ale to nic nie kosztuje, a oszczędza zdziwienia, gdy się
    # pojawi.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
